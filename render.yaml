services:
  - type: web
    name: hub-podium-beta-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: MAX_CONTENT_LENGTH_BYTES
        value: "2147483648"
