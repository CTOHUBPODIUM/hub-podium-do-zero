name: Deploy HUB-Podium Site

on:
  push:
    branches:
      - main
    paths:
      - "landing-page/**"
      - ".github/workflows/deploy-landing-page.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            landing-page

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload landing page artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./landing-page

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
